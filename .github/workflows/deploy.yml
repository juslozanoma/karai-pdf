name: Deploy

on:
  push:
    branches: [main]
  # Permite lanzar el deploy manualmente desde la pestaña Actions de GitHub sin necesidad de un
  # push nuevo (útil para reintentar sin tener que hacer un commit vacío).
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Evita que dos despliegues corran en paralelo y se pisen entre sí; si se dispara uno nuevo
# mientras otro está en curso, se cancela el anterior en vez de dejarlo terminar.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
